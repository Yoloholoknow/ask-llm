services:
  ollama:
    image: ollama/ollama:latest
    container_name: ask-ollama
    restart: unless-stopped
    ports:
      # OLLAMA_BIND controls exposure:
      #   127.0.0.1 = local only (safe default)
      #   0.0.0.0   = exposed on network (for Pi/cloud server use)
      - "${OLLAMA_BIND:-127.0.0.1}:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - ./scripts/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
      - ASK_MODEL=${ASK_MODEL:-qwen2.5:1.5b}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    # GPU support (uncomment if you have an Nvidia GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-models:
