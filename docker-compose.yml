services:
  ollama:
    image: ollama/ollama:0.24.0
    container_name: ask-ollama
    restart: unless-stopped
    mem_limit: ${OLLAMA_MEM_LIMIT:-3500m}
    ports:
      # OLLAMA_BIND controls exposure:
      #   127.0.0.1 = local only (safe default)
      #   0.0.0.0   = exposed on network (for Pi/cloud server use)
      - "${OLLAMA_BIND:-127.0.0.1}:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - ./scripts/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_KEEP_ALIVE=-1
      - ASK_MODEL=${ASK_MODEL:-qwen3.5:0.8b}
      - OLLAMA_MAX_LOADED_MODELS=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_FLASH_ATTENTION=${OLLAMA_FLASH_ATTENTION:-1}
      - OLLAMA_KV_CACHE_TYPE=${OLLAMA_KV_CACHE_TYPE:-q8_0}
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

    # GPU support (uncomment if you have an Nvidia GPU):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-models:
